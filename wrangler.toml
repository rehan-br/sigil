name = "sigil"
compatibility_date = "2025-04-01"
pages_build_output_dir = "dist"

# KV namespace bound at the SIGIL_KV runtime variable name.
# `id` was created in the dashboard (Storage & databases → Workers KV).
# `preview_id` reuses the same namespace; we don't run wrangler pages dev
# against it (the dev server uses an in-memory Map via vite.config.js).
[[kv_namespaces]]
binding = "SIGIL_KV"
id = "2dab98d4f54d4f8e96024c55e10864cc"
preview_id = "2dab98d4f54d4f8e96024c55e10864cc"
